<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>{{ title }}</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: "Segoe UI", "Microsoft YaHei", sans-serif; margin: 20px; background: #1a1a1a; color: #e0e0e0; }
    h1 { margin-bottom: 8px; font-weight: 600; }
    .count { color: #888; font-size: 14px; margin-bottom: 24px; }
    ul { list-style: none; display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; padding: 0; margin: 0; }
    li { margin: 0; }
    li a { display: flex; flex-direction: column; text-decoration: none; color: #ccc; border: 1px solid #333; border-radius: 8px; overflow: hidden; transition: border-color .2s, color .2s; }
    li a:hover { border-color: #555; color: #fff; }
    .thumb-wrap { position: relative; width: 100%; }
    .thumb { width: 100%; height: auto; min-height: 120px; object-fit: cover; background: #2a2a2a; display: block; }
    .thumb-4k { position: absolute; top: 6px; left: 6px; width: 40px; height: auto; z-index: 1; }
    .no-thumb { padding: 48px 16px; text-align: center; background: #2a2a2a; color: #666; font-size: 12px; }
    .name { padding: 10px; font-size: 12px; line-height: 1.3; word-break: break-all; }
  </style>
</head>
<body>
  <h1>{{ title }}</h1>
  <p class="count">共 {{ total }} 个视频 · 点击封面用本地播放器打开</p>
  <ul>
    {% for it in items %}
    <li>
      <a href="{{ it.file_url }}" target="_blank">
        {% if it.thumb_rel %}
        <span class="thumb-wrap">
          <img src="{{ it.thumb_rel }}" alt="" class="thumb"/>
          {% if it.is_4k %}<img src="4k-uhd.png" alt="4K" class="thumb-4k"/>{% endif %}
        </span>
        {% else %}
        <span class="no-thumb">无缩略图</span>
        {% endif %}
        <span class="name">{{ it.name }}</span>
      </a>
    </li>
    {% endfor %}
  </ul>
</body>
</html>
